router_settings:
  routing_strategy: simple-shuffle
  cooldown_time: 30
  allowed_fails: 2
  num_retries: 2
  timeout: 30
  enable_pre_call_checks: false
  ignore_cooldown_on_fallbacks: true
  min_params_filter: 130

proxy_settings:
  drop_params: true
  num_retries: 2
  request_timeout: 60
  stream_timeout: 300
  connect_timeout: 30
  watchdog_timeout: 30
  proven_watchdog_timeout: 60
  reasoning_watchdog_timeout: 80
  lock_duration: 30
  smart_switch_delay: 300
  fan_out_size: 10
  allowed_fails: 2
  cooldown_time: 30
  fallbacks:
    - free-llm: ["free-llm-fallback"]

port: 4000
