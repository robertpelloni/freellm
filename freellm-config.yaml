router_settings:
  routing_strategy: priority-ranked
  cooldown_time: 60
  allowed_fails: 1
  num_retries: 5
  timeout: 10
  enable_pre_call_checks: true
  ignore_cooldown_on_fallbacks: true
  min_params_filter: 120

proxy_settings:
  drop_params: true
  num_retries: 2
  request_timeout: 300
  stream_timeout: 300
  connect_timeout: 120
  watchdog_timeout: 120
  proven_watchdog_timeout: 240
  reasoning_watchdog_timeout: 240
  lock_duration: 60
  smart_switch_delay: 30
  fan_out_size: 3
  allowed_fails: 3
  cooldown_time: 30
  enable_rtk: false
  enable_headroom: true
  enable_llmlingua: false
  enable_tokdiet: true
  fallbacks:
    - free-llm: ["free-llm-fallback"]

port: 4000

judge_settings:
  enabled: true
  url: "http://127.0.0.1:11434/v1/chat/completions"
  model: "gemma-4-heretic:latest"
  timeout_seconds: 300
