router_settings:
  routing_strategy: priority-ranked
  cooldown_time: 60
  allowed_fails: 1
  num_retries: 5
  timeout: 10
  enable_pre_call_checks: true
  ignore_cooldown_on_fallbacks: true
  min_params_filter: 10

proxy_settings:
  drop_params: true
  num_retries: 2
  request_timeout: 60
  stream_timeout: 300
  connect_timeout: 30
  watchdog_timeout: 30
  proven_watchdog_timeout: 60
  reasoning_watchdog_timeout: 80
  lock_duration: 30
  smart_switch_delay: 300
  fan_out_size: 1
  allowed_fails: 2
  cooldown_time: 30
  fallbacks:
    - free-llm: ["free-llm-fallback"]

port: 4000
